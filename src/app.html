<!doctype html>
<html lang="en" %sveltekit.theme%>
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="google-adsense-account" content="ca-pub-2219281381026289" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#7c3aed" />
		<script>
			// Theme flash-prevention: read stored theme before paint.
			(() => {
				try {
					const stored = localStorage.getItem('theme');
					const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme = stored === 'dark' || stored === 'light' ? stored : sysDark ? 'dark' : 'light';
					document.documentElement.dataset.theme = theme;
					if (theme === 'dark') document.documentElement.classList.add('dark');
				} catch {
					/* localStorage unavailable */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen antialiased relative">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
